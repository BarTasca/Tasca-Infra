name: ci

on:
  push:
    branches: [ develop, "feature/**" ]
  pull_request:
    branches: [ develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore ../BarTascaBackend/BarTascaBackend.sln
      - name: Build
        run: dotnet build ../BarTascaBackend/BarTascaBackend.sln --configuration Release --no-restore

  docker:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: ../BarTascaBackend
          file: ../BarTascaBackend/BarTascaBackend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/bar-tasca-api:sha-${{ github.sha }}
